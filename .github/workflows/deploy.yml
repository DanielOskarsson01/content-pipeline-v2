name: Deploy to Hetzner

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build client
        run: cd client && npm ci && npm run build

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HETZNER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "${{ secrets.KNOWN_HOSTS }}" > ~/.ssh/known_hosts

      - name: Write build info
        run: |
          echo "{\"commit\":\"$(git rev-parse --short HEAD)\",\"message\":\"$(git log -1 --format=%s)\",\"time\":\"$(git log -1 --format=%ci)\"}" > build-info.json

      - name: Sync app to server
        run: |
          rsync -azP --delete \
            --exclude='node_modules' \
            --exclude='.env' \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.DS_Store' \
            --exclude='logs' \
            --exclude='DEPLOY_ONLY' \
            -e "ssh -i ~/.ssh/deploy_key" \
            ./ root@188.245.110.34:/opt/content-pipeline-v2/

      - name: Configure nginx body size limit
        run: |
          ssh -i ~/.ssh/deploy_key root@188.245.110.34 \
            "grep -q client_max_body_size /etc/nginx/sites-available/default || sed -i '/server_name/a\\    client_max_body_size 50m;' /etc/nginx/sites-available/default && nginx -t && systemctl reload nginx"

      - name: Remove stale .git and mark as CI/CD-only
        run: |
          ssh -i ~/.ssh/deploy_key root@188.245.110.34 \
            "rm -rf /opt/content-pipeline-v2/.git && echo 'This directory is deployed by CI/CD (GitHub Actions). DO NOT run git commands here. Any git pull/checkout will fail or corrupt the deployment. To deploy: push to main branch on GitHub.' > /opt/content-pipeline-v2/DEPLOY_ONLY"

      - name: Install deps and restart
        run: |
          ssh -i ~/.ssh/deploy_key root@188.245.110.34 \
            "cd /opt/content-pipeline-v2 && mkdir -p logs && npm install --omit=dev && npx playwright install --with-deps chromium && pm2 delete content-pipeline-v2 2>/dev/null || true && pm2 startOrReload ecosystem.config.cjs --update-env && pm2 save"

      - name: Verify deployment
        run: |
          DEPLOYED_COMMIT=$(ssh -i ~/.ssh/deploy_key root@188.245.110.34 "cat /opt/content-pipeline-v2/build-info.json 2>/dev/null | python3 -c 'import sys,json; print(json.load(sys.stdin)[\"commit\"])' 2>/dev/null || echo 'UNKNOWN'")
          EXPECTED_COMMIT=$(git rev-parse --short HEAD)
          echo "Expected: $EXPECTED_COMMIT | Deployed: $DEPLOYED_COMMIT"
          if [ "$DEPLOYED_COMMIT" != "$EXPECTED_COMMIT" ]; then
            echo "::warning::Deployment verification failed — build-info.json commit ($DEPLOYED_COMMIT) does not match expected ($EXPECTED_COMMIT)"
          fi
